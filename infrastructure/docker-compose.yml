version: '3.8'

services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "8080:80"
    env_file:
      - ../.env
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
